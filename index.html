<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<title>Lyfe</title>
<script>
/* apply saved theme before first paint — day=light, night=dark, auto=by clock */
(function () {
  var set = "auto";
  try {
    var d = JSON.parse(localStorage.getItem("lyfe.v1"));
    if (d && d.settings && d.settings.theme) set = d.settings.theme;
  } catch (e) { /* default auto */ }
  var mode;
  if (set === "day" || set === "light") mode = "light";
  else if (set === "night" || set === "dark") mode = "dark";
  else { var h = new Date().getHours(); mode = (h >= 7 && h < 18) ? "light" : "dark"; }
  document.documentElement.setAttribute("data-theme", mode);
})();
</script>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

</head>
<body>
<div id="scroll-progress" aria-hidden="true"></div>
<div id="stars" aria-hidden="true"></div>
<div id="bg-glow" aria-hidden="true"></div>

<div id="app">
  <aside id="sidebar">
    <nav id="nav" aria-label="Sections"></nav>
    <div class="side-foot">
      <button class="linklike" data-action="export">Export</button>
      <span class="sep">·</span>
      <button class="linklike" data-action="import">Import</button>
      <span class="sep">·</span>
      <button class="linklike" data-action="settings">Settings</button>
      <input type="file" id="importFile" accept=".json,application/json" hidden>
    </div>
  </aside>
  <main id="main"></main>
</div>

<div id="modal-root"></div>
<div id="toast-root"></div>
<script src="app.js?v=orbit-15"></script>
<script>
/* register the service worker so Lyfe installs + runs offline on Android.
   only over http/https (not file://). */
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("sw.js").catch(function () { /* offline install optional */ });
  });
}
</script>
</body>
</html>
